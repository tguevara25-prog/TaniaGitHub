<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="estilos.css">
    <title>Condicionales</title>
</head>

<body>
    <main>
        <div class="disco">
            <h2>Disco</h2>
            <label for="edadDisco" class="form-label">¿Qué edad tienes?</label>
            <input type="number" class="form-control" id="edadDisco">
            <button type="submit" class="btn btn-primary" onclick="comprobarEdad()">Comprobar</button>
            <p id="disco"></p>
        </div>


        <div class="concierto">
            <h2>Concierto</h2>

           
                <p>¿Tienes entrada?</p>
                <input class="form-check-input" type="radio" name="entrada" id="entradaSI" checked value="si">
                <label class="form-check-label" for="entradaSI">
                    Sí
                </label>
            
                <input class="form-check-input" type="radio" name="entrada" id="entradaNO"  value="no">
                <label class="form-check-label" for="entradaNO">
                    No 
                </label>
           

            <br>

            <label for="edadConcierto" class="form-label">¿Qué edad tienes?</label>
            <input type="text" class="form-control" id="edadConcierto">

            <button type="submit" class="btn btn-primary" onclick="comprobarDatos()">Comprobar</button>

            <p id="concierto"></p>
        </div>
        <div class="idioma">
            <h2>Idioma</h2>
            <button type="button" class="btn btn-warning" onclick="escribir('esp')">Español</button>
            <button type="button" class="btn btn-warning" onclick="escribir('eng')">Inglés</button>
            <button type="button" class="btn btn-warning" onclick="escribir('fr')">Francés</button>
            <button type="button" class="btn btn-warning" onclick="escribir('ale')">Alemán</button>

            <p id="idioma"></p>
        </div>
        <div class="entradas">
            <h2>Entradas</h2>

            <label for="edadEntradas" class="form-label">¿Qué edad tienes?</label>
            <input type="text" class="form-control" id="edadEntradas">
            <label for="entrada" class="form-label">¿Cuántas entradas quieres?</label>
            <input type="number" class="form-control" id="entrada">
            <button type="submit" class="btn btn-primary" onclick="calcularPrecio()">Calcular</button>

            <p id="precio"></p>
        </div>
    </main>
    <script src="app.js"></script>
</body>

</html>
