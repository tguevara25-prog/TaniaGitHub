<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="estilos.css">
  <title>Pasaporte de bares</title>
</head>

<body>
  <main>
    <section id="acceso">
      <h1>Pasaporte de tapas del Raval</h1>
      <p>Visita los 19 bares de la ruta y completa tu pasaporte digital</p>
      <label for="nombre">Nombre:</label>
      <input id="nombre" type="text" placeholder="Tu nombre aquí">
      <button id="btnEntrar">Entrar</button>
      <p id="mensajeAcceso"></p>
    </section>

    <section id="pasaporte">
      <header>
        <h2 id="saludo"></h2>
        <p id="progreso"></p>
        <div class="barra">
          <div class="barraProgreso"></div>
        </div>
        <p id="estadoPasaporte"></p>
      </header>

      <section id="listaBares"></section>
      <p id="mensajeSello"></p>
    </section>
  </main>
  <script src="script.js"></script>
</body>

</html>
